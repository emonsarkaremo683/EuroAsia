<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadership Profile — EUROASIA Co.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css"/>
    <style>
        .leadership-hero {
            padding: 120px 0 80px;
            background: var(--off-white);
            min-height: 80vh;
            position: relative;
        }
        .profile-img-wrap {
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            aspect-ratio: 3/4;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-tag {
            position: absolute;
            top: 20px;
            left: -10px;
            background: var(--gold);
            color: var(--white);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            padding: 8px 16px;
            border-radius: 4px;
            box-shadow: var(--shadow-sm);
        }
        .profile-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            color: var(--navy);
            line-height: 1.1;
            margin-bottom: 8px;
        }
        .profile-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--green);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 24px;
            display: block;
        }
        .profile-intro {
            font-size: 1.2rem;
            color: var(--navy);
            font-style: italic;
            line-height: 1.8;
            margin-bottom: 32px;
            border-left: 4px solid var(--green);
            padding-left: 20px;
        }
        .profile-content p {
            font-size: 1.05rem;
            color: var(--text-body);
            line-height: 1.8;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav id="mainNav" class="navbar navbar-expand-lg fixed-top" data-solid="true">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <span class="logo-icon"><i class="bi bi-scissors"></i></span>
                <span class="logo-text">EUROASIA<span class="logo-dot">.</span></span>
            </a>
            <a href="index.html#contact" class="nav-cta btn ms-auto">Get a Quote</a>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="leadership-hero">
        <div class="container">
            <a href="index.html#messages" class="back-btn"><i class="bi bi-arrow-left"></i> Back to Leadership</a>
            
            <div id="leadershipContent">
                <div class="row g-5 align-items-center">
                    <div class="col-12 col-lg-5 text-center text-lg-start">
                        <div class="skeleton" style="height: 500px; max-width: 450px; margin: 0 auto; border-radius: 24px;"></div>
                    </div>
                    <div class="col-12 col-lg-7">
                        <div class="skeleton mb-3" style="height: 40px; width: 60%;"></div>
                        <div class="skeleton mb-4" style="height: 20px; width: 40%;"></div>
                        <div class="skeleton mb-4" style="height: 100px;"></div>
                        <div class="skeleton mb-3" style="height: 200px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="container py-5 text-center">
            <div class="footer-brand d-flex align-items-center justify-content-center gap-2 mb-3">
                <span class="logo-icon"><i class="bi bi-scissors"></i></span>
                <span class="logo-text text-white">EUROASIA<span class="logo-dot">.</span></span>
            </div>
            <p class="mb-1">&copy; 2025 EUROASIA Co. All rights reserved.</p>
            <p class="mb-0 text-white-50" style="font-size: 0.85rem;">Developed By Elite Tech IT</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/leadership-detail.js"></script>
</body>
</html>
