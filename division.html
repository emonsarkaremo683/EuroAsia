<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Division Details — VeraStitch Co.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css"/>
    <style>
        .division-hero {
            height: 60vh;
            display: flex;
            align-items: center;
            position: relative;
            background: var(--navy);
            color: var(--white);
            overflow: hidden;
            padding-top: 80px;
        }
        .division-hero-bg {
            position: absolute;
            inset: 0;
            opacity: 0.4;
            background-size: cover;
            background-position: center;
            z-index: 0;
        }
        .division-hero .container { position: relative; z-index: 1; }
        .stats-card {
            background: var(--navy-light);
            color: var(--white);
            padding: 40px;
            border-radius: var(--radius);
            border-left: 5px solid var(--gold);
        }
        .capability-item {
            padding: 15px 20px;
            background: var(--off-white);
            border-radius: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .capability-item i { color: var(--gold); }
    </style>
</head>
<body class="bg-white">
    <!-- NAVBAR (Simplified) -->
    <nav id="mainNav" class="navbar navbar-expand-lg fixed-top scrolled">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <span class="logo-icon"><i class="bi bi-scissors"></i></span>
                <span class="logo-text">VeraStitch<span class="text-gold">.</span></span>
            </a>
            <a href="index.html#contact" class="nav-cta btn ms-auto">Get a Quote</a>
        </div>
    </nav>

    <!-- HERO -->
    <header class="division-hero">
        <div class="division-hero-bg" id="divisionHeroBg"></div>
        <div class="container" data-animate="fade-up">
            <h1 class="display-2 fw-bold mb-3" id="divisionName">Division</h1>
            <p class="lead" id="divisionShortDesc">Leading the industry with precision and scale.</p>
        </div>
    </header>

    <!-- CONTENT -->
    <main class="section-pad">
        <div class="container">
            <div class="row g-5">
                <div class="col-lg-8" data-animate="fade-right">
                    <h2 class="mb-4">Operational Overview</h2>
                    <p class="section-body lead mb-5" id="divisionLongDesc">Loading detailed operations...</p>
                    
                    <h3 class="mb-4">Technical Capabilities</h3>
                    <div class="row g-3" id="capabilitiesGrid">
                        <!-- Populated by JS -->
                    </div>
                </div>
                <div class="col-lg-4" data-animate="fade-left">
                    <div class="sticky-top" style="top:120px">
                        <div class="stats-card">
                            <h4 class="mb-4 text-gold">Division Stats</h4>
                            <div id="statsContainer">
                                <!-- Populated by JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-navy text-white py-5">
	  <div class="container text-center">
		<div class="d-flex align-items-center justify-content-center gap-2 mb-4">
		  <span class="logo-icon h3 m-0"><i class="bi bi-scissors"></i></span>
		  <span class="logo-text h3 m-0">VeraStitch<span class="text-gold">.</span></span>
		</div>
		<p class="text-white-50 small mb-1">© 2025 VeraStitch Co. Ltd.</p>
		<p class="text-white-50 small mb-0">Developed By Elite Tech IT</p>
	  </div>
	</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/division-detail.js"></script>
</body>
</html>
