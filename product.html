<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details — EUROASIA Co.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <!-- NAVBAR (Simplified) -->
    <nav id="mainNav" class="navbar navbar-expand-lg fixed-top" data-solid="true">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <span class="logo-icon"><i class="bi bi-scissors"></i></span>
                <span class="logo-text">EUROASIA<span class="logo-dot">.</span></span>
            </a>
            <a href="index.html#contact" class="nav-cta btn ms-auto">Get a Quote</a>
        </div>
    </nav>

    <main class="product-detail-hero">
        <div class="container">
            <a href="index.html#products" class="back-btn"><i class="bi bi-arrow-left"></i> Back to Products</a>
            
            <div id="productDetailContent">
                <div class="row g-4 g-lg-5">
                    <div class="col-12 col-lg-6">
                        <div class="detail-img-wrap skeleton" style="height: 500px;"></div>
                    </div>
                    <div class="col-12 col-lg-6">
                        <div class="skeleton mb-2" style="height: 20px; width: 100px;"></div>
                        <div class="skeleton mb-4" style="height: 60px; width: 80%;"></div>
                        <div class="skeleton mb-3" style="height: 100px;"></div>
                        <div class="skeleton mb-4" style="height: 200px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- RELATED PRODUCTS -->
    <section class="section-pad bg-white">
        <div class="container">
            <div class="section-header mb-5">
                <h3 class="section-heading">Related Products</h3>
            </div>
            <div class="prod-carousel-outer">
                <div class="prod-track" id="relatedTrack">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="container py-5 text-center">
            <div class="footer-brand d-flex align-items-center justify-content-center gap-2 mb-3">
                <span class="logo-icon"><i class="bi bi-scissors"></i></span>
                <span class="logo-text text-white">EUROASIA<span class="logo-dot">.</span></span>
            </div>
            <p class="mb-1">© 2025 EUROASIA Co. All rights reserved.</p>
            <p class="mb-0 text-white-50" style="font-size: 0.85rem;">Developed By Elite Tech IT</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/product-detail.js"></script>
</body>
</html>
